<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adziq Products</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Montserrat&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0d0d0d;
  color:#fff;
  font-family:'Montserrat',sans-serif;
}

h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:50px;
  text-align:center;
  margin:60px 0;
}

.section {
  padding:60px 40px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card {
  position:relative;
  overflow:hidden;
}

.card img {
  width:100%;
  height:400px;
  object-fit:cover;
  transition:0.6s;
}

.card:hover img {
  transform:scale(1.08);
}

.label {
  position:absolute;
  bottom:0;
  background:linear-gradient(transparent,black);
  width:100%;
  padding:20px;
}

.label h3 {
  margin:0;
  font-size:14px;
  letter-spacing:2px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<body>

<h1>Adziq Collections</h1>

<!-- MARTIAL ARTS -->
<div class="section" id="martial">
  <h2>Martial Arts</h2>
  <div class="grid">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e?w=800">
      <div class="label"><h3>Karate Uniform</h3></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1584464491033-06628f3a6b7b?w=800">
      <div class="label"><h3>Jiu Jitsu Gi</h3></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1605296867424-35fc25c9212a?w=800">
      <div class="label"><h3>Fight Training Wear</h3></div>
    </div>

  </div>
</div>

<!-- GLOVES -->
<div class="section" id="gloves">
  <h2>Gloves</h2>
  <div class="grid">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e?w=800">
      <div class="label"><h3>Boxing Gloves</h3></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b?w=800">
      <div class="label"><h3>MMA Gloves</h3></div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=800">
      <div class="label"><h3>Tactical Gloves</h3></div>
    </div>

  </div>
</div>

</body>
</html>
